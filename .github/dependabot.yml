version: 2

updates:
  # npm / pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh

    open-pull-requests-limit: 10

    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 14

    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

      security-updates:
        applies-to: security-updates
        patterns:
          - "*"

    commit-message:
      prefix: deps
      prefix-development: deps-dev
      include: scope

    labels:
      - dependencies
      - npm

    ignore:
      - dependency-name: "@types/*"
        update-types:
          - version-update:semver-patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh

    open-pull-requests-limit: 5

    cooldown:
      default-days: 3

    groups:
      github-actions:
        patterns:
          - "*"

    commit-message:
      prefix: ci
      include: scope

    labels:
      - dependencies
      - ci
