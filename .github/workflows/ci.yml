name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:
# Cancel superseded runs on the same ref, but keep main-branch deploy runs
# safe by skipping cancel-in-progress for pushes to main.
# Cancel superseded runs on the same ref, but keep main-branch deploy runs
# safe by skipping cancel-in-progress for pushes to main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege token. CI only checks out code, installs, and builds.
permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Avoid telemetry/network noise in CI logs.
      VITE_CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # fetch-depth: 0 keeps full history so tools like Biome / commitlint
          # can run against the real git log if they ever need it.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # Pin to the project's declared packageManager so we don't rely on
        # self-update fetching the latest pnpm on every run.
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          # pnpm cache is auto-detected from package.json's `packageManager`
          # field in setup-node v6, but setting it explicitly is documented
          # and keeps cache behavior obvious to readers.
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm check

      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # Temporarily disabled — see commit/PR context. Re-enable by removing
      # the `if: ${{ false }}` guards on these steps.
      - name: Install Vercel CLI
        # Used by `vercel build` to produce a prebuilt output and by
        # the deploy job to upload it. We pin to a major version for
        # reproducibility; bump in one place when ready.
        if: ${{ false }}
        run: pnpm add -g vercel@latest

      - name: Build (Vite + Vercel)
        # `pnpm build` runs `tsc -b && vite build` (see package.json)
        # and produces dist/. We then wrap it into Vercel's expected
        # .vercel/output/ layout via `vercel build --prod`, which is
        # what `vercel deploy --prebuilt` consumes.
        if: ${{ false }}
        run: |
          pnpm build
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          # Production build needs the API URL; the Vite default is
          # http://localhost:3000/api (see AGENTS.md). Override here if
          # the deploy target requires a different value.
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.treksphere.io.vn' }}

      - name: Upload prebuilt output
        if: ${{ false }}
        uses: actions/upload-artifact@v7
        with:
          # Matches the deploy job's download step.
          name: vercel-output-${{ github.sha }}
          path: .vercel/output
          retention-days: 7
          if-no-files-found: error
