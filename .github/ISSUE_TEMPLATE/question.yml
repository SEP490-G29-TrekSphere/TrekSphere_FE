# .github/ISSUE_TEMPLATE/question.yml
# General question form. Encourages search-before-ask without scolding, and
# nudges people toward Discussions for open-ended help.
name: ❓ Question
description: Ask a usage, setup, or contribution question. For general help, prefer GitHub Discussions.
title: "[Question]: "
labels: ["question"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Before opening this issue, please confirm you have read the project's
        [Code of Conduct](https://github.com/SEP490-G29-TrekSphere/TrekSphere_FE/blob/main/CODE_OF_CONDUCT.md).
        For broader questions, consider
        [GitHub Discussions](https://github.com/SEP490-G29-TrekSphere/TrekSphere_FE/discussions) instead.
  - type: textarea
    id: context
    attributes:
      label: What are you trying to do?
      description: "Briefly state your goal so the maintainer can answer in context."
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried so far?
      description: "Commands run, files read, issues searched. Helps avoid no-op answers."
  - type: textarea
    id: question
    attributes:
      label: Specific question
      description: "One focused question is easier to answer than five."
