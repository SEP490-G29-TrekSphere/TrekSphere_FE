{
  "$schema": "https://json.schemastore.org/lefthook.json",
  "min_version": "1.0.0",
  "pre-commit": {
    "parallel": false,
    "commands": {
      "biome": {
        "run": "pnpm biome check --write --staged --no-errors-on-unmatched",
        "stage_fixed": true
      }
    }
  },
  "commit-msg": {
    "commands": {
      "commitlint": {
        "run": "pnpm commitlint --edit {1}"
      }
    }
  },
  "pre-push": {
    "commands": {
      "typecheck": {
        "run": "pnpm typecheck"
      }
    }
  }
}
